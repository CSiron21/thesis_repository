services:
  web:
    image: csiron21/thesis_library:latest
    ports:
      - "8082:80"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: thesis_library
      DB_USER: root
      DB_PASS: thesis_root_pass

  db:
    image: mysql:8.0
    command: --max-allowed-packet=67108864
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: thesis_root_pass
      MYSQL_DATABASE: thesis_library
    volumes:
      - thesis_db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  thesis_db_data:
